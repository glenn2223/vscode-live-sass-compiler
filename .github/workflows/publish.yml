name: Publish CI

on:
    release:
        types:
            - published

    # ALLOW MANUAL RUNS
    workflow_dispatch:

# Explicit minimal permissions following security best practices
permissions:
    contents: write # Required to checkout code and upload release assets

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x

            - name: Install dependencies
              run: npm ci

            - name: Build extension
              run: npm run vscode:prepublish

            - name: Suppress prepublish for packaging loop
              run: npm pkg set scripts.vscode:prepublish="echo 'already built'"

            - name: Install vsce and ovsx
              run: npm i @vscode/vsce ovsx -g

            - name: Remove sass-embedded platform binaries
              run: find node_modules -maxdepth 1 -name 'sass-embedded-*' -type d -exec rm -rf {} + 2>/dev/null || true

            - name: Package and publish all targets
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
                  IS_PRERELEASE: ${{ github.event.release.prerelease }}
              shell: bash
              run: |
                  SASS_VERSION=$(node -p "require('./node_modules/sass-embedded/package.json').version")
                  PKG_NAME=$(node -p "require('./package.json').name")
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "$IS_PRERELEASE" = "true" ]; then
                      PRERELEASE_FLAG="--pre-release"
                  else
                      PRERELEASE_FLAG=""
                  fi

                  # Format: "vscode-target:sass-embedded-pkg-suffix"
                  # --force is required so npm installs cross-platform binaries
                  # (bypasses os/cpu field checks on explicit installs)
                  TARGETS=(
                      "win32-x64:win32-x64"
                      "win32-arm64:win32-arm64"
                      "linux-x64:linux-x64"
                      "linux-arm64:linux-arm64"
                      "linux-armhf:linux-arm"
                      "alpine-x64:linux-musl-x64"
                      "alpine-arm64:linux-musl-arm64"
                      "darwin-x64:darwin-x64"
                      "darwin-arm64:darwin-arm64"
                  )

                  for ENTRY in "${TARGETS[@]}"; do
                      VSCODE_TARGET="${ENTRY%%:*}"
                      NPM_PKG="${ENTRY##*:}"
                      VSIX_FILE="${PKG_NAME}-${VSCODE_TARGET}-${PKG_VERSION}.vsix"

                      echo "::group::Building $VSCODE_TARGET"
                      npm install --force --no-save "sass-embedded-${NPM_PKG}@${SASS_VERSION}"
                      vsce package --target "$VSCODE_TARGET" --baseContentUrl "https://github.com/glenn2223/vscode-live-sass-compiler/raw/v${PKG_VERSION}/" $PRERELEASE_FLAG
                      vsce publish --packagePath "$VSIX_FILE" $PRERELEASE_FLAG
                      ovsx publish --packagePath "$VSIX_FILE" $PRERELEASE_FLAG

                      rm -rf "node_modules/sass-embedded-${NPM_PKG}"
                      echo "::endgroup::"
                  done

                  # Universal VSIX: no platform binary, falls back to sass.js (pure JS)
                  # Temporarily un-exclude node_modules/sass from .vscodeignore for this package only
                  echo "::group::Building universal"
                  printf '\n!node_modules/sass\n!node_modules/sass/**\n' >> .vscodeignore
                  vsce package --baseContentUrl "https://github.com/glenn2223/vscode-live-sass-compiler/raw/v${PKG_VERSION}/" $PRERELEASE_FLAG
                  git checkout -- .vscodeignore

                  UNIVERSAL_VSIX="${PKG_NAME}-${PKG_VERSION}.vsix"
                  vsce publish --packagePath "$UNIVERSAL_VSIX" $PRERELEASE_FLAG
                  ovsx publish --packagePath "$UNIVERSAL_VSIX" $PRERELEASE_FLAG
                  echo "::endgroup::"

            - name: Upload VSIX to release
              uses: softprops/action-gh-release@v2
              if: github.ref_type == 'tag'
              with:
                  files: |
                      **/*.vsix

            - name: Upload artifact for temporary reference
              if: github.ref_type == 'tag'
              uses: actions/upload-artifact@v4
              with:
                  path: |
                      **/*.vsix
